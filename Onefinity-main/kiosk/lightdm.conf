# LightDM Configuration for Onefinity CNC Kiosk Mode
#
# This configuration enables automatic login and kiosk mode
# Copy this file to /etc/lightdm/lightdm.conf.d/90-onefinity-kiosk.conf

[Seat:*]
# Auto-login as cnc user
autologin-user=cnc
autologin-user-timeout=0

# Don't show user list (more secure)
greeter-hide-users=true

# Session settings
user-session=lightdm-xsession
autologin-session=lightdm-xsession

# Display settings
display-setup-script=/opt/onefinity/kiosk/display-setup.sh

# Disable guest account
allow-guest=false
