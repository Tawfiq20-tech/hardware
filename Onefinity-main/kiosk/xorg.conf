# Xorg Configuration for Onefinity CNC Touchscreen
#
# This file configures display and touch input settings
# Copy to /etc/X11/xorg.conf.d/10-onefinity-display.conf

Section "ServerLayout"
    Identifier "Onefinity Layout"
    Screen 0 "Screen0" 0 0
EndSection

Section "Monitor"
    Identifier "Monitor0"
    Option "DPMS" "false"
EndSection

Section "Screen"
    Identifier "Screen0"
    Monitor "Monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
        # Adjust resolution as needed for your display
        Modes "1920x1080" "1680x1050" "1280x1024" "1024x768"
    EndSubSection
EndSection

Section "Device"
    Identifier "Card0"
    Driver "modesetting"
    Option "AccelMethod" "glamor"
    Option "DRI" "3"
EndSection

Section "ServerFlags"
    Option "BlankTime" "0"
    Option "StandbyTime" "0"
    Option "SuspendTime" "0"
    Option "OffTime" "0"
EndSection

# Touch screen configuration (libinput)
Section "InputClass"
    Identifier "Touchscreen"
    MatchIsTouchscreen "on"
    Driver "libinput"
    Option "AccelProfile" "flat"
    Option "AccelSpeed" "0"
    # Calibration will be added by xinput-calibrator if needed
EndSection
