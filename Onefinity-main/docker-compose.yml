services:
  # ── Redis (required by Bull job queue) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: onefinity-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6060:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - onefinity-network

  # ── Backend (Express + Socket.IO + serialport) ──────────────
  backend:
    build: ./backend
    container_name: onefinity-backend
    restart: unless-stopped
    ports:
      - "6070:4000"
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    # Grant access to USB/serial devices on the host.
    # On Linux, map /dev/ttyUSB* and /dev/ttyACM* into the container.
    # On Windows/macOS with Docker Desktop, serial pass-through
    # requires extra setup (see docs).
    privileged: true
    volumes:
      - /dev:/dev
      - backend-logs:/app/logs
    networks:
      - onefinity-network

  # ── Frontend (React served by nginx) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: onefinity-frontend
    restart: unless-stopped
    ports:
      - "6080:80"
    depends_on:
      - backend
    networks:
      - onefinity-network

  # ── Dozzle – Docker logs viewer (optional) ───────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: onefinity-dozzle
    environment:
      DOZZLE_BASE: /docker
      DOZZLE_LEVEL: info
      DOZZLE_NO_ANALYTICS: "true"
    ports:
      - "${DOZZLE_PORT:-6040}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - onefinity-network
    restart: unless-stopped
    profiles:
      - tools

volumes:
  redis-data:
  backend-logs:

networks:
  onefinity-network:
    driver: bridge
